<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freedom's Dawn</title>
  <link rel="stylesheet" href="stars-and-stripes.css" />
</head>
<body>
    <video
      class="page-bg-video"
      autoplay
      muted
      loop
      playsinline
      aria-hidden="true"
    >
      <source src="assets/Images/beach-sunrise.mp4" type="video/mp4" />
    </video>
  
    <main class="page-content">
      <section class="hero-scene" aria-label="Sunrise beach scene">
        <div class="sunrise-intro">
          <img
            class="sunrise-img"
            src="assets/Images/sunrise.png"
            alt=""
            aria-hidden="true"
          />
          <h1 class="sunrise-title">Freedom's Dawn</h1>
        </div>
        <img class="seagull seagull--1" 
        src="assets/Images/seagull_transparent.gif" 
        alt="" aria-hidden="true" />
        <img class="seagull seagull--2" 
        src="assets/Images/seagull_transparent.gif" 
        alt="" aria-hidden="true" />
        <img class="seagull seagull--3" 
        src="assets/Images/seagull_transparent.gif" 
        alt="" aria-hidden="true" />
        <img class="seagull seagull--4" 
        src="assets/Images/seagull_transparent.gif" 
        alt="" aria-hidden="true" />

      <img
        class="old-people"
        src="assets/Images/old-people-walking.png"
        alt="An old couple walking on the beach watching the sunrise on July 4th."
      />
      </section>
    </main>
  
  </body>
