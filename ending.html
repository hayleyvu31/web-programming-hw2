<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>United We Stand!</title>
  <link rel="stylesheet" href="stars-and-stripes.css" />
</head>
<body class="page-ending">
  <img
    class="page-bg-image"
    src="assets/Images/beach-at-night.jpg"
    alt=""
    aria-hidden="true"
  />

  <div class="fireworks-row" aria-hidden="true">
    <img class="firework-gif" src="assets/Images/fireworks.gif" alt="" />
    <img class="firework-gif" src="assets/Images/fireworks.gif" alt="" />
    <img class="firework-gif" src="assets/Images/fireworks.gif" alt="" />
    <img class="firework-gif" src="assets/Images/fireworks.gif" alt="" />
  </div>

  <main class="ending-content">
    <h1 class="ending-title">
      <span class="stagger-dot">United</span>
      <span class="stagger-dot">We</span>
      <span class="stagger-dot">Stand</span><span class="stagger-dot">!</span>
    </h1>
    <p class="ending-subtitle">
      <span class="stagger-dot">Happy</span>
      <span class="stagger-dot">4th</span>
      <span class="stagger-dot">of</span>
      <span class="stagger-dot">July</span>
    </p>
  </main>

  <img
    class="ending-scene ending-volleyball"
    src="assets/Images/volleyball.png"
    alt=""
    aria-hidden="true"
  />

  <img
    class="ending-scene ending-family"
    src="assets/Images/family.png"
    alt=""
    aria-hidden="true"
  />

  <img
    class="ending-scene ending-people-flagging"
    src="assets/Images/people-flagging.png"
    alt=""
    aria-hidden="true"
  />

  <img
    class="ending-scene ending-girl-flag"
    src="assets/Images/girl-flag.png"
    alt=""
    aria-hidden="true"
  />

  <a href="#play-anthem" class="charlie-click-link" aria-label="Click Charlie Puth to play the national anthem">
    <img
      class="charlie-img"
      src="assets/Images/charlieputh.png"
      alt=""
    />
  </a>

  <audio id="play-anthem" class="sunrise-audio" autoplay preload="auto">
    <source src="assets/Sound/national-anthem.mp3" type="audio/mpeg" />
  </audio>

  <div class="plaza-background plaza-background--rewind">
    <p class="fast-forward-text">Backward</p>
    <a href="patriot-plaza.html" class="fast-forward-container">
      <img src="assets/Images/Fast-Forward.png" alt="Back to Patriot's Plaza">
    </a>
  </div>

  <div class="plaza-background">
    <p class="fast-forward-text">Freedom's Dawn</p>
    <a href="index.html" class="fast-forward-container">
      <img src="assets/Images/Fast-Forward.png" alt="Back to Freedom's Dawn">
    </a>
  </div>
</body>
</html>
